name: harness-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  drift-and-cycle:
    name: Drift + ciclo install/update/rollback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Guarda de drift (versao unica + contagens 49-vs-53)
        run: node install/lib/sync-manifest.js
      - name: Gate de release (changelog + contagens README + conteudo-sem-changelog)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          git fetch origin main --depth=50 2>/dev/null || true
          node install/lib/check-release.js --base "${BASE_SHA:-origin/main}"
      - name: Regressao do gate de frescor de docs
        run: bash install/test/release-guard.sh
      - name: Ciclo install -> update -> rollback (pessoal sobrevive, orfaos podados, transacional)
        run: bash install/test/cycle.sh
      - name: E2E publicar skill -> banner -> /bsaios-update (git clone/pull real, remote local)
        run: bash install/test/e2e-publish.sh
      - name: Regressao do bug de tag movida no /bsaios-update (git fetch --force)
        run: bash install/test/regression-moved-tag.sh

  install-macos:
    name: install.sh --dry-run + verify (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: dry-run + health check
        run: |
          TMP="$(mktemp -d)"
          bash install/install.sh --claude-home "$TMP" --dry-run
          node install/lib/verify-harness.js --claude-home "$TMP"
      - name: Bootstrap — idempotencia + cadeia isolada (bootstrap-check)
        run: bash install/test/bootstrap-check.sh

  install-windows:
    name: install.ps1 -DryRun + verify (Windows — paridade)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: dry-run + health check
        shell: pwsh
        run: |
          $TMP = Join-Path $env:RUNNER_TEMP "claude-test"
          pwsh install/install.ps1 -DryRun -ClaudeHome $TMP
          node install/lib/verify-harness.js --claude-home $TMP
      - name: Bootstrap ps1 — smoke dry-run (sintaxe + fail-soft num Windows real)
        shell: pwsh
        run: pwsh install/bootstrap.ps1 -DryRun
